<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ATLAS Control Center</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b82f6;
        }
        .header h1 { font-size: 20px; color: #fff; }
        .header h1 span { color: #3b82f6; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .status-pill {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-live { background: #10b981; color: #fff; animation: pulse 2s infinite; }
        .status-idle { background: #6b7280; color: #fff; }
        .status-rendering { background: #f59e0b; color: #000; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .main { display: grid; grid-template-columns: 1fr 320px; gap: 15px; padding: 15px; height: calc(100vh - 56px); }

        .left-section { display: flex; flex-direction: column; gap: 15px; overflow: hidden; }

        /* Control Panel */
        .control-panel {
            background: linear-gradient(135deg, #1e3a5f 0%, #1a1a2e 100%);
            border-radius: 10px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .ctrl-btn {
            padding: 12px 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { transform: translateY(-2px); }
        .ctrl-btn .icon { font-size: 20px; }
        .btn-stop { background: #dc2626; color: #fff; }
        .btn-stop:hover { background: #b91c1c; }
        .btn-render { background: #10b981; color: #fff; }
        .btn-render:hover { background: #059669; }
        .btn-bible { background: #8b5cf6; color: #fff; }
        .btn-bible:hover { background: #7c3aed; }
        .btn-refresh { background: #3b82f6; color: #fff; }
        .btn-refresh:hover { background: #2563eb; }
        .btn-queue { background: #f59e0b; color: #000; }
        .btn-queue:hover { background: #d97706; }

        /* Video Section */
        .video-section {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .video-title {
            padding: 10px 15px;
            background: #1a1a2e;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .video-title .duration { color: #3b82f6; }
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 300px;
        }
        .video-container video, .video-container img {
            max-width: 100%;
            max-height: 100%;
        }
        .video-controls {
            padding: 10px 15px;
            background: #1a1a2e;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .video-controls button {
            padding: 6px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-secondary { background: #374151; color: #fff; }

        /* Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

        .panel {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }
        .panel-header {
            padding: 10px 14px;
            background: #1a1a2e;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header .count {
            background: #3b82f6;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
        }

        /* Agent Status */
        .agent-status { padding: 10px; }
        .agent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #1a1a2e;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 11px;
        }
        .agent-name { font-weight: 500; }
        .agent-state {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }
        .agent-idle { background: #374151; }
        .agent-busy { background: #f59e0b; color: #000; }
        .agent-error { background: #dc2626; }

        /* Render Queue */
        .queue-list { padding: 10px; max-height: 150px; overflow-y: auto; }
        .queue-item {
            padding: 8px 10px;
            background: #1a1a2e;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 11px;
        }
        .queue-item .shot-id { font-weight: 600; color: #3b82f6; }
        .queue-item .status { color: #888; }

        /* Shot Grid */
        .shot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 10px;
            max-height: 280px;
            overflow-y: auto;
        }
        .shot-card {
            aspect-ratio: 16/9;
            background: #1a1a2e;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .shot-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        .shot-card.active { box-shadow: 0 0 0 2px #3b82f6; }
        .shot-card img { width: 100%; height: 100%; object-fit: cover; }
        .shot-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 3px 5px;
            background: rgba(0,0,0,0.85);
            font-size: 8px;
            text-align: center;
        }

        /* Complete Videos */
        .complete-videos { padding: 10px; max-height: 200px; overflow-y: auto; }
        .complete-video-item {
            padding: 8px 10px;
            background: #1a1a2e;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .complete-video-item:hover { background: #2a2a4e; }
        .complete-video-item.active { background: #3b82f6; }
        .video-name { font-size: 11px; font-weight: 500; }
        .video-info { font-size: 9px; color: #888; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            min-width: 400px;
            max-width: 600px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h3 { font-size: 16px; }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #888; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #374151;
            border-radius: 6px;
            background: #0a0a0f;
            color: #fff;
            font-size: 13px;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }

        .loading { display: flex; align-items: center; justify-content: center; height: 100px; color: #666; font-size: 12px; }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 2000;
            animation: slideUp 0.3s ease;
        }
        .toast-success { background: #10b981; color: #fff; }
        .toast-error { background: #dc2626; color: #fff; }
        .toast-info { background: #3b82f6; color: #fff; }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>ATLAS</span> Control Center</h1>
        <div class="header-controls">
            <span class="status-pill" id="systemStatus">IDLE</span>
            <span id="lastUpdate" style="font-size: 11px; color: #888;">--</span>
        </div>
    </div>

    <div class="main">
        <div class="left-section">
            <!-- Control Panel -->
            <div class="control-panel">
                <button class="ctrl-btn btn-stop" onclick="emergencyStop()">
                    <span class="icon">STOP</span>
                    <span>Emergency Stop</span>
                </button>
                <button class="ctrl-btn btn-render" onclick="showRenderModal()">
                    <span class="icon">PLAY</span>
                    <span>Start Render</span>
                </button>
                <button class="ctrl-btn btn-bible" onclick="generateStoryBible()">
                    <span class="icon">BOOK</span>
                    <span>Story Bible</span>
                </button>
                <button class="ctrl-btn btn-queue" onclick="loadQueue()">
                    <span class="icon">LIST</span>
                    <span>View Queue</span>
                </button>
                <button class="ctrl-btn btn-refresh" onclick="refreshAll()">
                    <span class="icon">SYNC</span>
                    <span>Refresh All</span>
                </button>
            </div>

            <!-- Video Player -->
            <div class="video-section">
                <div class="video-title">
                    <span id="currentVideoName">Select a video...</span>
                    <span class="duration" id="currentDuration">--:--</span>
                </div>
                <div class="video-container" id="mediaContainer">
                    <video id="mainVideo" controls muted>
                        <source src="" type="video/mp4">
                    </video>
                </div>
                <div class="video-controls">
                    <button class="btn-primary" onclick="playPause()">Play/Pause</button>
                    <button class="btn-secondary" onclick="skipBack()">-10s</button>
                    <button class="btn-secondary" onclick="skipForward()">+10s</button>
                    <button class="btn-secondary" onclick="toggleFullscreen()">Fullscreen</button>
                    <button class="btn-secondary" onclick="playSlideshow()">Slideshow</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <!-- Agent Status -->
            <div class="panel">
                <div class="panel-header">
                    Agent Status
                    <span class="count" id="agentCount">0</span>
                </div>
                <div class="agent-status" id="agentStatus">
                    <div class="loading">Loading agents...</div>
                </div>
            </div>

            <!-- Render Queue -->
            <div class="panel">
                <div class="panel-header">
                    Render Queue
                    <span class="count" id="queueCount">0</span>
                </div>
                <div class="queue-list" id="queueList">
                    <div class="loading">No active jobs</div>
                </div>
            </div>

            <!-- Complete Episodes -->
            <div class="panel">
                <div class="panel-header">
                    Complete Episodes
                    <span class="count" id="episodeCount">0</span>
                </div>
                <div class="complete-videos" id="completeVideos">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <!-- Shot Gallery -->
            <div class="panel" style="flex: 1;">
                <div class="panel-header">
                    Latest Shots
                    <span class="count" id="shotCount">0</span>
                </div>
                <div class="shot-grid" id="shotGrid">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Render Modal -->
    <div class="modal" id="renderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Start Episode Render</h3>
                <button class="modal-close" onclick="closeModal('renderModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" id="projectName" value="ravencroft_episode_1" placeholder="e.g., ravencroft_episode_1">
            </div>
            <div class="form-group">
                <label>Episode Title</label>
                <input type="text" id="episodeTitle" value="The Ritual" placeholder="e.g., The Ritual">
            </div>
            <div class="form-group">
                <label>Number of Scenes</label>
                <input type="number" id="numScenes" value="15" min="1" max="50">
            </div>
            <div class="form-group">
                <label>Director Profile</label>
                <select id="directorProfile">
                    <option value="ravencroft_gothic_v2">Ravencroft Gothic v2</option>
                    <option value="back2back_continuity_v2">Back2Back Continuity v2</option>
                    <option value="parallel_master_reference_v2">Parallel Master Reference v2</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('renderModal')">Cancel</button>
                <button class="btn-primary" onclick="startRender()">Start Render</button>
            </div>
        </div>
    </div>

    <script>
        const mainVideo = document.getElementById('mainVideo');
        const mediaContainer = document.getElementById('mediaContainer');
        let currentPlaying = null;
        let slideshowInterval = null;
        let shots = [];
        let slideshowIndex = 0;

        // Toast notification
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Modal controls
        function showRenderModal() {
            document.getElementById('renderModal').classList.add('show');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        // Emergency Stop
        async function emergencyStop() {
            if (!confirm('EMERGENCY STOP - This will halt all rendering. Continue?')) return;
            try {
                const resp = await fetch('/api/stop-all', { method: 'POST' });
                const data = await resp.json();
                showToast('Emergency stop activated!', 'error');
                updateSystemStatus('STOPPED');
                loadAgentStatus();
                loadQueue();
            } catch (err) {
                showToast('Stop failed: ' + err.message, 'error');
            }
        }

        // Start Render
        async function startRender() {
            const project = document.getElementById('projectName').value;
            const title = document.getElementById('episodeTitle').value;
            const scenes = parseInt(document.getElementById('numScenes').value);
            const profile = document.getElementById('directorProfile').value;

            closeModal('renderModal');
            showToast('Starting render...', 'info');
            updateSystemStatus('RENDERING');

            try {
                const resp = await fetch('/api/auto/generate-episode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        project_name: project,
                        episode_title: title,
                        num_scenes: scenes,
                        director_profile: profile
                    })
                });
                const data = await resp.json();
                if (data.error) {
                    showToast('Render error: ' + data.error, 'error');
                } else {
                    showToast('Render started: ' + (data.message || 'Processing...'), 'success');
                }
            } catch (err) {
                showToast('Failed to start render: ' + err.message, 'error');
            }
        }

        // Generate Story Bible
        async function generateStoryBible() {
            showToast('Generating story bible...', 'info');
            try {
                const resp = await fetch('/api/auto/generate-story-bible', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        project_name: document.getElementById('projectName')?.value || 'ravencroft',
                        genre: 'gothic_horror'
                    })
                });
                const data = await resp.json();
                showToast('Story bible generated!', 'success');
            } catch (err) {
                showToast('Bible generation failed: ' + err.message, 'error');
            }
        }

        // Load Agent Status
        async function loadAgentStatus() {
            try {
                const resp = await fetch('/api/auto/agents/status');
                const data = await resp.json();
                const agentDiv = document.getElementById('agentStatus');

                const agents = data.agents || [];
                document.getElementById('agentCount').textContent = agents.length;

                if (agents.length > 0) {
                    agentDiv.innerHTML = agents.map(a => `
                        <div class="agent-item">
                            <span class="agent-name">${a.name || a.type}</span>
                            <span class="agent-state agent-${a.status || 'idle'}">${(a.status || 'idle').toUpperCase()}</span>
                        </div>
                    `).join('');
                } else {
                    // Default agents
                    agentDiv.innerHTML = `
                        <div class="agent-item">
                            <span class="agent-name">Pipeline Agent</span>
                            <span class="agent-state agent-idle">IDLE</span>
                        </div>
                        <div class="agent-item">
                            <span class="agent-name">Renderer Agent</span>
                            <span class="agent-state agent-idle">IDLE</span>
                        </div>
                        <div class="agent-item">
                            <span class="agent-name">QA Agent</span>
                            <span class="agent-state agent-idle">IDLE</span>
                        </div>
                    `;
                }
            } catch (err) {
                console.error('Agent status error:', err);
            }
        }

        // Load Queue
        async function loadQueue() {
            try {
                const resp = await fetch('/api/agents/renderer/jobs');
                const data = await resp.json();
                const queueDiv = document.getElementById('queueList');

                const jobs = data.jobs || [];
                document.getElementById('queueCount').textContent = jobs.length;

                if (jobs.length > 0) {
                    queueDiv.innerHTML = jobs.slice(0, 10).map(j => `
                        <div class="queue-item">
                            <span class="shot-id">${j.shot_id || j.id || 'Unknown'}</span>
                            <span class="status">${j.status || 'pending'}</span>
                        </div>
                    `).join('');
                } else {
                    queueDiv.innerHTML = '<div class="loading">No active jobs</div>';
                }
            } catch (err) {
                console.error('Queue error:', err);
            }
        }

        // Load Content
        async function loadContent() {
            try {
                const resp = await fetch('/api/viewer/content');
                const data = await resp.json();

                // Complete videos
                const completeDiv = document.getElementById('completeVideos');
                const episodes = data.complete_videos || [];
                document.getElementById('episodeCount').textContent = episodes.length;

                if (episodes.length > 0) {
                    completeDiv.innerHTML = episodes.map((v, i) => `
                        <div class="complete-video-item ${i === 0 ? 'active' : ''}"
                             onclick="playComplete('${v.path}', '${v.name}', this)">
                            <div>
                                <div class="video-name">${v.name}</div>
                                <div class="video-info">${v.duration || '--'} | ${v.size || '--'}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    completeDiv.innerHTML = '<div class="loading">No complete videos</div>';
                }

                // Individual shots
                const shotGrid = document.getElementById('shotGrid');
                shots = data.shots || [];
                document.getElementById('shotCount').textContent = shots.length;

                if (shots.length > 0) {
                    shotGrid.innerHTML = shots.map((s, i) => `
                        <div class="shot-card" data-index="${i}" onclick="playShot('${s.video_path || s.image_path}', '${s.name}', this, ${i})">
                            <img src="${s.image_path}" alt="${s.name}" loading="lazy" onerror="this.style.display='none'">
                            <div class="shot-label">${s.name}</div>
                        </div>
                    `).join('');
                } else {
                    shotGrid.innerHTML = '<div class="loading">No shots found</div>';
                }

                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();

            } catch (err) {
                console.error('Load error:', err);
            }
        }

        function updateSystemStatus(status) {
            const el = document.getElementById('systemStatus');
            el.textContent = status;
            el.className = 'status-pill';
            if (status === 'RENDERING') el.classList.add('status-rendering');
            else if (status === 'LIVE') el.classList.add('status-live');
            else el.classList.add('status-idle');
        }

        function playComplete(path, name, el) {
            document.querySelectorAll('.complete-video-item').forEach(e => e.classList.remove('active'));
            if (el) el.classList.add('active');
            stopSlideshow();

            mainVideo.src = path;
            mainVideo.style.display = 'block';
            mainVideo.play();
            document.getElementById('currentVideoName').textContent = name;
            currentPlaying = path;
        }

        function playShot(path, name, el, index) {
            document.querySelectorAll('.shot-card').forEach(e => e.classList.remove('active'));
            if (el) el.classList.add('active');
            slideshowIndex = index || 0;
            stopSlideshow();

            if (path.endsWith('.mp4') || path.endsWith('.mov')) {
                mainVideo.src = path;
                mainVideo.style.display = 'block';
                mainVideo.play();
            } else {
                // Show image
                mainVideo.pause();
                mainVideo.style.display = 'none';
                let img = mediaContainer.querySelector('img.preview');
                if (!img) {
                    img = document.createElement('img');
                    img.className = 'preview';
                    img.style.cssText = 'max-width:100%;max-height:100%;';
                    mediaContainer.appendChild(img);
                }
                img.src = path;
                img.style.display = 'block';
            }
            document.getElementById('currentVideoName').textContent = name;
            currentPlaying = path;
        }

        function playSlideshow() {
            if (shots.length === 0) {
                showToast('No shots to slideshow', 'error');
                return;
            }
            stopSlideshow();
            showToast('Starting slideshow...', 'info');

            slideshowInterval = setInterval(() => {
                slideshowIndex = (slideshowIndex + 1) % shots.length;
                const shot = shots[slideshowIndex];
                const card = document.querySelector(`.shot-card[data-index="${slideshowIndex}"]`);
                playShot(shot.image_path, shot.name, card, slideshowIndex);
            }, 2000);
        }

        function stopSlideshow() {
            if (slideshowInterval) {
                clearInterval(slideshowInterval);
                slideshowInterval = null;
            }
            const previewImg = mediaContainer.querySelector('img.preview');
            if (previewImg) previewImg.style.display = 'none';
        }

        function playPause() {
            stopSlideshow();
            if (mainVideo.paused) mainVideo.play();
            else mainVideo.pause();
        }
        function skipBack() { mainVideo.currentTime -= 10; }
        function skipForward() { mainVideo.currentTime += 10; }
        function toggleFullscreen() {
            if (document.fullscreenElement) document.exitFullscreen();
            else mainVideo.requestFullscreen();
        }

        function refreshAll() {
            showToast('Refreshing...', 'info');
            loadContent();
            loadAgentStatus();
            loadQueue();
        }

        mainVideo.addEventListener('loadedmetadata', () => {
            const mins = Math.floor(mainVideo.duration / 60);
            const secs = Math.floor(mainVideo.duration % 60);
            document.getElementById('currentDuration').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        });

        // Initial load
        loadContent();
        loadAgentStatus();
        loadQueue();

        // Auto-refresh every 15 seconds
        setInterval(() => {
            loadContent();
            loadAgentStatus();
            loadQueue();
        }, 15000);
    </script>
</body>
</html>
