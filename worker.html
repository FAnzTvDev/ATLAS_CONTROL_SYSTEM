<!DOCTYPE html>
<html>
<head>
    <title>Atlas Worker Tab</title>
    <style>
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
            margin: 0;
        }
        .header {
            border-bottom: 2px solid #00ff00;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .worker-id {
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00;
        }
        .status {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .status-card {
            background: #1a1a1a;
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .status-value {
            font-size: 1.5em;
            color: #00ff00;
        }
        .current-task {
            background: #1a1a1a;
            border: 2px solid #ffaa00;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .current-task.idle {
            border-color: #00ff00;
        }
        .progress-bar {
            background: #0d0d0d;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #00ff00, #00aa00);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .log {
            background: #0d0d0d;
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #003300;
        }
        .log-entry.success { color: #00ff00; }
        .log-entry.warning { color: #ffaa00; }
        .log-entry.error { color: #ff0000; }
        .log-entry.info { color: #00aaff; }
        .preview {
            background: #1a1a1a;
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .preview img, .preview video {
            max-width: 100%;
            max-height: 300px;
            border: 1px solid #00ff00;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="worker-id">⚙️ WORKER TAB: <span id="worker-id">Connecting...</span></div>
        <div>Status: <span id="connection-status">Initializing</span></div>
    </div>

    <div class="status">
        <div class="status-card">
            <div class="status-value" id="tasks-completed">0</div>
            <div>Completed</div>
        </div>
        <div class="status-card">
            <div class="status-value" id="tasks-failed">0</div>
            <div>Failed</div>
        </div>
        <div class="status-card">
            <div class="status-value" id="worker-status">IDLE</div>
            <div>Current Status</div>
        </div>
    </div>

    <div class="current-task idle" id="current-task">
        <h3>Current Task</h3>
        <p id="task-info">Waiting for tasks...</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <div class="preview" id="preview" style="display: none;">
        <h3>Preview</h3>
        <div id="preview-content"></div>
    </div>

    <div class="log">
        <h3>Worker Log</h3>
        <div id="log"></div>
    </div>

    <script>
        let ws = null;
        let workerId = null;
        let apiKeys = {};
        let currentTask = null;
        let tasksCompleted = 0;
        let tasksFailed = 0;

        // Connect to orchestrator
        function connect() {
            const wsUrl = `ws://${window.location.host}/ws/worker/${Date.now()}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                addLog('Connected to orchestrator', 'success');
                document.getElementById('connection-status').textContent = 'Connected';
            };

            ws.onmessage = async (event) => {
                const message = JSON.parse(event.data);
                await handleMessage(message);
            };

            ws.onclose = () => {
                addLog('Disconnected from orchestrator', 'error');
                document.getElementById('connection-status').textContent = 'Disconnected';
                setTimeout(connect, 2000);
            };

            ws.onerror = (error) => {
                addLog(`WebSocket error: ${error}`, 'error');
            };
        }

        async function handleMessage(message) {
            switch (message.type) {
                case 'init':
                    workerId = message.worker_id;
                    apiKeys = message.config;
                    document.getElementById('worker-id').textContent = workerId;
                    addLog(`Initialized as worker ${workerId}`, 'success');
                    requestTask();
                    break;

                case 'task_assigned':
                    await processTask(message.task);
                    break;

                case 'no_tasks':
                    updateStatus('IDLE');
                    setTimeout(requestTask, 2000);
                    break;
            }
        }

        function requestTask() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'request_task' }));
            }
        }

        async function processTask(task) {
            currentTask = task;
            updateStatus('BUSY');
            updateProgress(0, 'Starting task...');

            addLog(`Processing task ${task.id}: ${task.type}`, 'info');

            const taskCard = document.getElementById('current-task');
            taskCard.className = 'current-task';
            document.getElementById('task-info').innerHTML = `
                <strong>Type:</strong> ${task.type}<br>
                <strong>Task ID:</strong> ${task.id}<br>
                <strong>Status:</strong> Processing...
            `;

            try {
                let result;

                switch (task.type) {
                    case 'nano_banana_image':
                        result = await generateNanoBanana(task.params);
                        break;
                    case 'minimax_image':
                        result = await generateMinimaxImage(task.params);
                        break;
                    case 'flux_angles':
                        result = await generateFluxAngles(task.params);
                        break;
                    case 'omnihuman_lipsync':
                        result = await generateOmniHuman(task.params);
                        break;
                    case 'runway_env':
                        result = await generateRunway(task.params);
                        break;
                    case 'wan_motion':
                        result = await generateWanMotion(task.params);
                        break;
                    case 'elevenlabs_audio':
                        result = await generateElevenLabsAudio(task.params);
                        break;
                    case 'upload_gcs':
                        result = await uploadToGCS(task.params);
                        break;
                    default:
                        throw new Error(`Unknown task type: ${task.type}`);
                }

                // Show preview if result has media URL
                if (result.url || result.image_url || result.video_url) {
                    showPreview(result);
                }

                // Report success
                ws.send(JSON.stringify({
                    type: 'task_complete',
                    task_id: task.id,
                    result: result
                }));

                tasksCompleted++;
                document.getElementById('tasks-completed').textContent = tasksCompleted;
                addLog(`✅ Task ${task.id} completed`, 'success');

            } catch (error) {
                // Report failure
                ws.send(JSON.stringify({
                    type: 'task_failed',
                    task_id: task.id,
                    error: error.message
                }));

                tasksFailed++;
                document.getElementById('tasks-failed').textContent = tasksFailed;
                addLog(`❌ Task ${task.id} failed: ${error.message}`, 'error');
            }

            // Request next task
            currentTask = null;
            updateStatus('IDLE');
            setTimeout(requestTask, 500);
        }

        async function generateNanoBanana(params) {
            updateProgress(10, 'Calling Google Nano Banana API...');

            // Build input matching user's Replicate usage pattern
            const input = {
                prompt: params.prompt,
                output_format: params.output_format || 'jpg'
            };

            // Add image_input if reference provided
            if (params.image_input) {
                input.image_input = params.image_input;
            }

            // Add aspect ratio
            if (params.aspect_ratio) {
                input.aspect_ratio = params.aspect_ratio;
            } else {
                input.aspect_ratio = params.image_input ? 'match_input_image' : '16:9';
            }

            const response = await fetch('https://api.replicate.com/v1/predictions', {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${apiKeys.replicate_key}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    version: "google/nano-banana",
                    input: input
                })
            });

            if (!response.ok) {
                throw new Error(`Nano Banana API error: ${response.status}`);
            }

            const prediction = await response.json();
            updateProgress(30, 'Waiting for Nano Banana generation...');

            // Poll for result
            const result = await pollPrediction(prediction.id, apiKeys.replicate_key);
            updateProgress(100, 'Nano Banana complete!');

            return {
                image_url: result.output,
                url: result.output,
                prediction_id: prediction.id
            };
        }

        async function generateMinimaxImage(params) {
            // V15 MODEL LOCK: Minimax is FORBIDDEN - route through Nano Banana Pro
            updateProgress(10, 'V15 Model Lock: Routing image through Nano Banana Pro...');
            addLog('⚠️ Minimax deprecated (V15) - using Nano Banana Pro', 'warning');

            // Route through orchestrator's locked image endpoint
            const response = await fetch('/api/auto/generate-image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: params.prompt,
                    reference_urls: params.reference_image ? [params.reference_image] : [],
                    aspect_ratio: params.aspect_ratio || "16:9",
                    shot_id: params.shot_id || `img_${Date.now()}`
                })
            });

            if (!response.ok) {
                throw new Error(`Image API error: ${response.status}`);
            }

            const result = await response.json();
            updateProgress(100, 'Image generated via Nano Banana Pro (V15 compliant)');

            return {
                image_url: result.url || result.image_url,
                model_used: 'fal-ai/nano-banana-pro/edit',
                v15_compliant: true
            };
        }

        async function generateFluxAngles(params) {
            // V15 MODEL LOCK: Flux is FORBIDDEN - route through Nano Banana Pro
            updateProgress(10, 'V15 Model Lock: Generating multi-angle shots via Nano Banana Pro...');
            addLog('⚠️ Flux deprecated (V15) - using Nano Banana Pro', 'warning');

            const angles = [
                "frontal view, eye level",
                "profile view, side angle",
                "low angle, looking up",
                "high angle, looking down",
                "over-shoulder perspective"
            ];

            const results = [];

            for (let i = 0; i < angles.length; i++) {
                updateProgress(20 + (i * 15), `Generating angle ${i + 1}/${angles.length} via Nano Banana Pro...`);

                // Route through orchestrator's locked image endpoint
                const response = await fetch('/api/auto/generate-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: `${params.prompt}, ${angles[i]}, cinematic lighting, 8k`,
                        reference_urls: params.input_image ? [params.input_image] : [],
                        aspect_ratio: "16:9",
                        shot_id: `angle_${i}_${Date.now()}`
                    })
                });

                if (!response.ok) {
                    throw new Error(`Image API error on angle ${i}: ${response.status}`);
                }

                const result = await response.json();
                results.push(result.url || result.image_url);
            }

            updateProgress(100, 'All angles complete via Nano Banana Pro (V15 compliant)');

            return {
                images: results,
                angles: angles,
                model_used: 'fal-ai/nano-banana-pro/edit',
                v15_compliant: true
            };
        }

        async function generateOmniHuman(params) {
            // V15 MODEL LOCK: OmniHuman is FORBIDDEN - route through LTXv2 instead
            updateProgress(10, 'V15 Model Lock: Routing lip sync through LTXv2...');
            addLog('⚠️ OmniHuman deprecated (V15) - using LTXv2 video generation', 'warning');

            // Route through orchestrator's locked LTXv2 endpoint
            const response = await fetch('/api/ltxv2/generate-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image_url: params.reference_image,
                    prompt: 'subtle breathing, natural micro-expressions, lip movement sync, temporal coherence',
                    duration: 8,
                    shot_id: params.shot_id || `lipsync_${Date.now()}`
                })
            });

            if (!response.ok) {
                throw new Error(`LTXv2 API error: ${response.status}`);
            }

            const data = await response.json();
            updateProgress(100, 'Video generated via LTXv2 (V15 compliant)');

            return {
                video_url: data.video_url,
                model_used: 'fal-ai/ltxv-2/image-to-video/fast',
                v15_compliant: true
            };
        }

        async function generateRunway(params) {
            // V15 MODEL LOCK: Runway is FORBIDDEN - route through LTXv2 instead
            updateProgress(10, 'V15 Model Lock: Routing environment video through LTXv2...');
            addLog('⚠️ Runway deprecated (V15) - using LTXv2 video generation', 'warning');

            // Route through orchestrator's locked LTXv2 endpoint
            const response = await fetch('/api/ltxv2/generate-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image_url: params.image_url || params.first_frame,
                    prompt: params.prompt || 'slow camera movement, environmental atmosphere, temporal coherence',
                    duration: params.duration || 8,
                    shot_id: params.shot_id || `env_${Date.now()}`
                })
            });

            if (!response.ok) {
                throw new Error(`LTXv2 API error: ${response.status}`);
            }

            const data = await response.json();
            updateProgress(100, 'Video generated via LTXv2 (V15 compliant)');

            return {
                video_url: data.video_url,
                model_used: 'fal-ai/ltxv-2/image-to-video/fast',
                v15_compliant: true
            };
        }

        async function generateWanMotion(params) {
            // V15 MODEL LOCK: Wan 2.2 is FORBIDDEN - route through LTXv2 instead
            updateProgress(10, 'V15 Model Lock: Routing I2V motion through LTXv2...');
            addLog('⚠️ Wan 2.2 deprecated (V15) - using LTXv2 video generation', 'warning');

            // Route through orchestrator's locked LTXv2 endpoint
            const response = await fetch('/api/ltxv2/generate-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image_url: params.input_image,
                    prompt: params.prompt || 'natural motion, character movement, temporal coherence',
                    duration: 8,
                    shot_id: params.shot_id || `motion_${Date.now()}`
                })
            });

            if (!response.ok) {
                throw new Error(`LTXv2 API error: ${response.status}`);
            }

            const data = await response.json();
            updateProgress(100, 'Video generated via LTXv2 (V15 compliant)');

            return {
                video_url: data.video_url,
                model_used: 'fal-ai/ltxv-2/image-to-video/fast',
                v15_compliant: true
            };
        }

        async function generateElevenLabsAudio(params) {
            updateProgress(20, 'Generating voice audio...');

            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${params.voice_id}`, {
                method: 'POST',
                headers: {
                    'xi-api-key': apiKeys.elevenlabs_key,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    text: params.text,
                    model_id: "eleven_monolingual_v1",
                    voice_settings: {
                        stability: 0.5,
                        similarity_boost: 0.75
                    }
                })
            });

            if (!response.ok) {
                throw new Error(`ElevenLabs API error: ${response.status}`);
            }

            const audioBlob = await response.blob();
            updateProgress(100, 'Audio generated!');

            // Convert to base64 or upload to GCS here
            const audioUrl = URL.createObjectURL(audioBlob);

            return {
                audio_url: audioUrl,
                blob: audioBlob
            };
        }

        async function uploadToGCS(params) {
            updateProgress(30, 'Uploading to Google Cloud Storage...');

            // This would use gsutil or Cloud Storage API
            // For now, just simulate
            await new Promise(resolve => setTimeout(resolve, 1000));

            updateProgress(100, 'Upload complete!');

            return {
                gcs_url: `gs://temporalmovie/${params.path}`,
                public_url: `https://storage.googleapis.com/temporalmovie/${params.path}`
            };
        }

        async function pollPrediction(predictionId, apiKey) {
            const maxAttempts = 120; // 10 minutes
            let attempts = 0;

            while (attempts < maxAttempts) {
                const response = await fetch(`https://api.replicate.com/v1/predictions/${predictionId}`, {
                    headers: { 'Authorization': `Token ${apiKey}` }
                });

                const prediction = await response.json();

                if (prediction.status === 'succeeded') {
                    return prediction;
                } else if (prediction.status === 'failed') {
                    throw new Error(prediction.error || 'Prediction failed');
                }

                attempts++;
                updateProgress(30 + (attempts / maxAttempts * 60), `Polling... (${attempts}/${maxAttempts})`);
                await new Promise(resolve => setTimeout(resolve, 5000));
            }

            throw new Error('Prediction timed out');
        }

        async function pollFalStatus(requestId) {
            const maxAttempts = 60;
            let attempts = 0;

            while (attempts < maxAttempts) {
                const response = await fetch(`https://fal.run/fal-ai/bytedance/omnihuman/status/${requestId}`, {
                    headers: { 'Authorization': `Key ${apiKeys.fal_key}` }
                });

                const data = await response.json();

                if (data.status === 'completed') {
                    return data;
                } else if (data.status === 'failed') {
                    throw new Error(data.error || 'FAL request failed');
                }

                attempts++;
                await new Promise(resolve => setTimeout(resolve, 5000));
            }

            throw new Error('FAL request timed out');
        }

        function showPreview(result) {
            const preview = document.getElementById('preview');
            const content = document.getElementById('preview-content');

            if (result.image_url) {
                content.innerHTML = `<img src="${result.image_url}" alt="Generated image">`;
            } else if (result.video_url) {
                content.innerHTML = `<video src="${result.video_url}" controls autoplay loop></video>`;
            } else if (result.images && result.images.length > 0) {
                content.innerHTML = result.images.map(url =>
                    `<img src="${url}" alt="Generated angle" style="width: 200px; margin: 5px;">`
                ).join('');
            }

            preview.style.display = 'block';
        }

        function updateStatus(status) {
            document.getElementById('worker-status').textContent = status;
        }

        function updateProgress(percent, message) {
            const fill = document.getElementById('progress');
            fill.style.width = `${percent}%`;
            fill.textContent = `${percent}%`;

            if (message) {
                addLog(message, 'info');
            }
        }

        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.insertBefore(entry, log.firstChild);

            // Keep only last 100 entries
            while (log.children.length > 100) {
                log.removeChild(log.lastChild);
            }
        }

        // Start connection
        connect();

        // Keep connection alive
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 30000);
    </script>
</body>
</html>
