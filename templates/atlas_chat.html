<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>ATLAS Command</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a28;
  --border: #2a2a3a; --text: #e0e0e8; --text-dim: #888898;
  --accent: #6366f1; --accent-glow: rgba(99,102,241,0.3);
  --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Inter', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* App shell */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-title span { color: var(--accent); }
.header-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Thread list */
.thread-bar {
  display: flex; gap: 8px; padding: 8px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.thread-bar::-webkit-scrollbar { display: none; }
.thread-chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 13px; color: var(--text-dim); cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.thread-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
.thread-chip:hover { border-color: var(--accent); }
.thread-new { color: var(--accent); font-weight: 600; }

/* Messages area */
.messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex;
  flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch;
}
.msg {
  max-width: 85%; padding: 12px 16px; border-radius: 16px;
  font-size: 15px; line-height: 1.5; word-wrap: break-word;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
.msg.system { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.system .agent-badge {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-director { background: rgba(99,102,241,0.2); color: #818cf8; }
.badge-builder { background: rgba(34,197,94,0.2); color: #4ade80; }
.badge-qa { background: rgba(245,158,11,0.2); color: #fbbf24; }
.badge-system { background: rgba(136,136,152,0.15); color: var(--text-dim); }
.msg pre {
  background: var(--bg); padding: 10px; border-radius: 8px; margin-top: 8px;
  overflow-x: auto; font-size: 13px; font-family: 'SF Mono', monospace;
}
.msg .verdict { font-size: 13px; margin-top: 6px; padding: 6px 10px; border-radius: 8px; }
.verdict-pass { background: rgba(34,197,94,0.15); color: var(--green); }
.verdict-fail { background: rgba(239,68,68,0.15); color: var(--red); }

/* Typing indicator */
.typing { align-self: flex-start; padding: 12px 20px; background: var(--surface2); border-radius: 16px; display: none; }
.typing.active { display: flex; gap: 4px; align-items: center; }
.typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); animation: typeDot 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typeDot { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }

/* Quick actions */
.quick-actions {
  display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 0;
}
.quick-actions::-webkit-scrollbar { display: none; }
.quick-btn {
  flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 13px; color: var(--text); cursor: pointer; transition: all 0.2s;
}
.quick-btn:hover, .quick-btn:active { border-color: var(--accent); background: rgba(99,102,241,0.1); }

/* Input area */
.input-area {
  display: flex; align-items: flex-end; gap: 8px; padding: 12px 16px;
  background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.input-area textarea {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 10px 16px; color: var(--text);
  font-size: 16px; font-family: var(--font); resize: none; outline: none;
  max-height: 120px; min-height: 40px; line-height: 1.4;
  transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text-dim); }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--accent); color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.send-btn:hover { background: #5558e6; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn svg { width: 20px; height: 20px; }

/* Agent status panel */
.agents-panel {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 20px 16px; border-radius: 20px 20px 0 0; z-index: 100;
  max-height: 60vh; overflow-y: auto;
}
.agents-panel.open { display: block; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.agents-panel h3 { font-size: 16px; margin-bottom: 12px; }
.agent-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 8px;
}
.agent-card .name { font-weight: 600; font-size: 14px; }
.agent-card .model { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.agent-card .speed { font-size: 12px; color: var(--green); margin-top: 4px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
.overlay.open { display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title"><span>ATLAS</span> Command</div>
    </div>
    <div class="header-status" onclick="toggleAgentsPanel()">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">3 agents online</span>
    </div>
  </div>

  <div class="thread-bar" id="threadBar">
    <div class="thread-chip active" data-thread="main" onclick="switchThread('main')">Main</div>
    <div class="thread-chip thread-new" onclick="newThread()">+ New</div>
  </div>

  <div class="messages" id="messages">
    <div class="msg system">
      <div class="agent-badge badge-system">ATLAS</div>
      <div>ATLAS Command ready. Director, Builder, and QA agents online. Send any intent — natural language works.</div>
    </div>
  </div>

  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="quick-actions">
    <div class="quick-btn" onclick="quickSend('Run session enforcer health check')">Health Check</div>
    <div class="quick-btn" onclick="quickSend('Show agent status and response times')">Agent Status</div>
    <div class="quick-btn" onclick="quickSend('List all projects')">Projects</div>
    <div class="quick-btn" onclick="quickSend('Run generation gate preflight for victorian_shadows_ep1')">Preflight</div>
    <div class="quick-btn" onclick="quickSend('Show training pipeline status')">Training</div>
    <div class="quick-btn" onclick="quickSend('Run dispatch history')">History</div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Tell ATLAS what to do..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
    </button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleAgentsPanel()"></div>
<div class="agents-panel" id="agentsPanel">
  <h3>Agent Stack</h3>
  <div id="agentCards">Loading...</div>
</div>

<script>
const API_BASE = window.location.origin;
let threads = { main: [] };
let activeThread = 'main';
let threadCounter = 0;
let sending = false;

function addMessage(role, content, agent) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'system' && agent) {
    const badgeClass = agent === 'director' ? 'badge-director' : agent === 'builder' ? 'badge-builder' : agent === 'qa' ? 'badge-qa' : 'badge-system';
    div.innerHTML = `<div class="agent-badge ${badgeClass}">${agent}</div><div>${formatContent(content)}</div>`;
  } else {
    div.textContent = content;
  }
  document.getElementById('messages').appendChild(div);
  threads[activeThread].push({ role, content, agent });
  scrollToBottom();
}

function formatContent(text) {
  // Format JSON blocks
  text = text.replace(/```json\n?([\s\S]*?)```/g, '<pre>$1</pre>');
  text = text.replace(/```\n?([\s\S]*?)```/g, '<pre>$1</pre>');
  // Format verdicts
  text = text.replace(/PASS/g, '<span class="verdict verdict-pass">PASS</span>');
  text = text.replace(/FAIL/g, '<span class="verdict verdict-fail">FAIL</span>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  requestAnimationFrame(() => m.scrollTop = m.scrollHeight);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || sending) return;

  sending = true;
  input.value = '';
  autoResize(input);
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showTyping(true);

  try {
    const resp = await fetch(`${API_BASE}/atlas/dispatch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ intent: text })
    });

    const data = await resp.json();
    showTyping(false);

    if (data.messages) {
      for (const msg of data.messages) {
        addMessage('system', msg.content, msg.agent || msg.role);
      }
    }

    // Show final status
    const status = data.status || 'unknown';
    const verdict = data.qa_verdict;
    if (verdict) {
      const v = verdict.verdict || 'UNKNOWN';
      const score = verdict.score || 0;
      addMessage('system', `Pipeline ${status}: ${v} (score: ${score})\n${verdict.summary || ''}`, 'system');
    } else if (data.error) {
      addMessage('system', `Error: ${data.error}`, 'system');
    }

  } catch (err) {
    showTyping(false);
    addMessage('system', `Connection error: ${err.message}. Is ATLAS running?`, 'system');
  }

  sending = false;
  document.getElementById('sendBtn').disabled = false;
}

function quickSend(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

function showTyping(on) {
  document.getElementById('typing').className = on ? 'typing active' : 'typing';
}

function switchThread(id) {
  activeThread = id;
  document.querySelectorAll('.thread-chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-thread="${id}"]`).classList.add('active');
  renderMessages();
}

function newThread() {
  threadCounter++;
  const id = `thread_${threadCounter}`;
  threads[id] = [];
  const bar = document.getElementById('threadBar');
  const chip = document.createElement('div');
  chip.className = 'thread-chip';
  chip.dataset.thread = id;
  chip.textContent = `Thread ${threadCounter}`;
  chip.onclick = () => switchThread(id);
  bar.insertBefore(chip, bar.lastElementChild);
  switchThread(id);
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  if (!threads[activeThread] || threads[activeThread].length === 0) {
    addMessage('system', 'New thread. Send a command to begin.', 'system');
    return;
  }
  for (const msg of threads[activeThread]) {
    const div = document.createElement('div');
    div.className = `msg ${msg.role}`;
    if (msg.role === 'system' && msg.agent) {
      const bc = msg.agent === 'director' ? 'badge-director' : msg.agent === 'builder' ? 'badge-builder' : msg.agent === 'qa' ? 'badge-qa' : 'badge-system';
      div.innerHTML = `<div class="agent-badge ${bc}">${msg.agent}</div><div>${formatContent(msg.content)}</div>`;
    } else {
      div.textContent = msg.content;
    }
    container.appendChild(div);
  }
  scrollToBottom();
}

function toggleAgentsPanel() {
  const panel = document.getElementById('agentsPanel');
  const overlay = document.getElementById('overlay');
  const open = !panel.classList.contains('open');
  panel.classList.toggle('open', open);
  overlay.classList.toggle('open', open);
  if (open) loadAgentStatus();
}

async function loadAgentStatus() {
  try {
    const resp = await fetch(`${API_BASE}/atlas/agents/status`);
    const data = await resp.json();
    const container = document.getElementById('agentCards');
    container.innerHTML = '';
    for (const [name, info] of Object.entries(data.agents || {})) {
      const card = document.createElement('div');
      card.className = 'agent-card';
      card.innerHTML = `
        <div class="name">${name.charAt(0).toUpperCase() + name.slice(1)} Agent</div>
        <div class="model">${info.model}</div>
        <div class="speed">${info.status === 'online' ? '● Online' : '○ Offline'} — ${info.response_ms}ms</div>
      `;
      container.appendChild(card);
    }
  } catch (e) {
    document.getElementById('agentCards').innerHTML = '<div style="color:var(--red)">Failed to load agent status</div>';
  }
}

// Check agents on load
async function checkStatus() {
  try {
    const resp = await fetch(`${API_BASE}/atlas/agents/status`);
    const data = await resp.json();
    const agents = Object.values(data.agents || {});
    const online = agents.filter(a => a.status === 'online').length;
    document.getElementById('statusText').textContent = `${online} agents online`;
    document.getElementById('statusDot').style.background = online === agents.length ? 'var(--green)' : online > 0 ? 'var(--amber)' : 'var(--red)';
  } catch (e) {
    document.getElementById('statusText').textContent = 'Offline';
    document.getElementById('statusDot').style.background = 'var(--red)';
  }
}

checkStatus();
setInterval(checkStatus, 30000);
</script>
</body>
</html>
